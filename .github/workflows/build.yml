name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Download WinDivert
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/basil00/WinDivert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip" -OutFile "windivert.zip"
          Expand-Archive -Path "windivert.zip" -DestinationPath "windivert_extracted"

          $driverDir = "${{ github.workspace }}\windivert_lib"
          New-Item -ItemType Directory -Force -Path $driverDir

          if ("${{ matrix.target }}" -like "x86_64*") {
              Copy-Item -Path "windivert_extracted\WinDivert-2.2.2-A\x64\*" -Destination $driverDir
          } else {
              Copy-Item -Path "windivert_extracted\WinDivert-2.2.2-A\x86\*" -Destination $driverDir
          }

          # Also copy headers needed for linking
          Copy-Item -Path "windivert_extracted\WinDivert-2.2.2-A\include\*" -Destination $driverDir -ErrorAction SilentlyContinue

      - name: Build
        env:
          WINDIVERT_PATH: ${{ github.workspace }}\windivert_lib
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/sni-spoof.exe artifact/
          cp config.json artifact/
          cp windivert_lib/WinDivert.dll artifact/ 2>/dev/null || true
          cp windivert_lib/WinDivert64.sys artifact/ 2>/dev/null || true
          cp windivert_lib/WinDivert32.sys artifact/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sni-spoof-${{ matrix.target }}
          path: artifact/

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnetfilter-queue-dev libnfnetlink-dev

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/sni-spoof artifact/
          cp config.json artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sni-spoof-${{ matrix.target }}
          path: artifact/